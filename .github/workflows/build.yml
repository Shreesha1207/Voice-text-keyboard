name: Build & Release Xvoice

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows (.exe) ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyaudio pynput webrtcvad-wheels python-dotenv requests pystray Pillow pyinstaller

      - name: Fix webrtcvad metadata (PyInstaller compatibility)
        shell: pwsh
        run: |
          $site = python -c "import site; print(site.getsitepackages()[0])"
          $dir  = "$site\Lib\site-packages\webrtcvad-2.0.10.dist-info"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Content "$dir\METADATA" "Metadata-Version: 2.1`nName: webrtcvad`nVersion: 2.0.10"

      - name: Build xvoice.exe
        run: pyinstaller xvoice.spec

      - uses: actions/upload-artifact@v4
        with:
          name: xvoice-windows
          path: dist/xvoice.exe

  # ── macOS (.dmg) ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: brew install portaudio create-dmg

      - name: Install Python dependencies
        run: pip install pyaudio pynput webrtcvad python-dotenv requests pystray Pillow pyinstaller

      - name: Build Xvoice.app
        run: pyinstaller xvoice.spec

      - name: Create .dmg installer
        run: |
          create-dmg \
            --volname "Xvoice" \
            --volicon "dist/Xvoice.app/Contents/Resources/icon-windowed.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Xvoice.app" 180 170 \
            --hide-extension "Xvoice.app" \
            --app-drop-link 480 170 \
            --background-color "#1a1a2e" \
            "dist/Xvoice.dmg" \
            "dist/Xvoice.app" \
          || true
          # Fallback: if create-dmg fails (e.g. missing icon), use hdiutil
          if [ ! -f "dist/Xvoice.dmg" ]; then
            hdiutil create -volname "Xvoice" -srcfolder dist/Xvoice.app -ov -format UDZO dist/Xvoice.dmg
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: xvoice-macos
          path: dist/Xvoice.dmg

  # ── Linux (.AppImage) ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            libgirepository1.0-dev \
            gir1.2-gtk-3.0 \
            python3-dev \
            gcc \
            libfuse2 \
            fuse

      - name: Install Python dependencies
        run: pip install pyaudio pynput webrtcvad python-dotenv requests pystray Pillow pyinstaller

      - name: Build xvoice binary
        run: pyinstaller xvoice.spec

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/xvoice AppDir/usr/bin/xvoice
          chmod +x AppDir/usr/bin/xvoice

          # AppRun entrypoint
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export PATH="${HERE}/usr/bin/:${PATH}"
          exec "${HERE}/usr/bin/xvoice" "$@"
          EOF
          chmod +x AppDir/AppRun

          # .desktop file
          cat > AppDir/xvoice.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Xvoice
          Exec=xvoice
          Icon=xvoice
          Comment=Press F8 anywhere to instantly convert your voice to text
          Categories=Utility;
          NoDisplay=false
          EOF

          # Placeholder icon (32x32 purple PNG via Python Pillow)
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (0,0,0,0))
          d = ImageDraw.Draw(img)
          d.ellipse([0,0,255,255], fill=(124,58,237,255))
          d.rounded_rectangle([82,30,174,150], radius=38, fill='white')
          d.arc([54,96,202,208], start=0, end=180, fill='white', width=14)
          d.line([128,208,128,240], fill='white', width=14)
          d.line([96,240,160,240], fill='white', width=14)
          img.save('AppDir/xvoice.png')
          "

      - name: Package as AppImage
        run: |
          ARCH=x86_64 ./appimagetool AppDir dist/Xvoice-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: xvoice-linux
          path: dist/Xvoice-x86_64.AppImage

  # ── GitHub Release (waits for all 3 builds) ───────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Xvoice ${{ github.ref_name }}"
          files: |
            artifacts/xvoice-windows/xvoice.exe
            artifacts/xvoice-macos/Xvoice.dmg
            artifacts/xvoice-linux/Xvoice-x86_64.AppImage
          body: |
            ## Xvoice ${{ github.ref_name }}

            | Platform | Download | Instructions |
            |----------|----------|--------------|
            | 🪟 Windows | `xvoice.exe` | Double-click to run |
            | 🍎 macOS  | `Xvoice.dmg` | Open DMG → drag Xvoice to Applications |
            | 🐧 Linux  | `Xvoice-x86_64.AppImage` | `chmod +x Xvoice-x86_64.AppImage && ./Xvoice-x86_64.AppImage` |

            ### First run
            Your browser will open automatically to link your Xvoice account.
            Press **F8** anywhere on your computer to start dictating.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
