name: Build & Release Xvoice

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows (.exe) ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify spec file
        shell: pwsh
        run: |
          if (!(Test-Path "xvoice.spec")) {
            Write-Error "xvoice.spec not found! Commit it to the repo."
            exit 1
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install webrtcvad-wheels pynput python-dotenv requests pystray Pillow pyinstaller
          pip install PyAudio --find-links https://github.com/intxcc/pyaudio_portaudio/releases

      - name: Fix webrtcvad metadata
        shell: pwsh
        run: |
          # Find the actual site-packages directory (not the Python root)
          $site = python -c "import site; dirs = site.getsitepackages(); sp = next((d for d in dirs if 'site-packages' in d), dirs[-1]); print(sp)"
          Write-Host "Using site-packages: $site"
          $dir = "$site\webrtcvad-2.0.14.dist-info"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Content "$dir\METADATA" "Metadata-Version: 2.1`nName: webrtcvad`nVersion: 2.0.14"
          Set-Content "$dir\INSTALLER" "pip"
          Write-Host "Created: $dir\METADATA"
          Get-Content "$dir\METADATA"

      - name: Build xvoice.exe
        run: pyinstaller --noconfirm xvoice.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (!(Test-Path "dist\xvoice.exe")) {
            Write-Error "Build failed: dist/xvoice.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xvoice-windows
          path: dist/xvoice.exe

  # ── macOS (.dmg) ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: brew install portaudio create-dmg

      - name: Install Python dependencies
        run: |
          export LDFLAGS="-L/opt/homebrew/lib"
          export CPPFLAGS="-I/opt/homebrew/include"
          pip install pyaudio pynput webrtcvad-wheels python-dotenv requests pystray Pillow pyinstaller

      - name: Fix webrtcvad metadata
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          DIR="$SITE/webrtcvad-2.0.14.dist-info"
          mkdir -p "$DIR"
          printf 'Metadata-Version: 2.1\nName: webrtcvad\nVersion: 2.0.14\n' > "$DIR/METADATA"
          echo "Created: $DIR/METADATA"
          cat "$DIR/METADATA"


      - name: Build Xvoice.app
        run: pyinstaller --noconfirm xvoice.spec

      - name: Verify app exists
        run: |
          if [ ! -d "dist/Xvoice.app" ]; then
            echo "Build failed: Xvoice.app not found"
            exit 1
          fi

      - name: Create .dmg installer
        run: |
          create-dmg \
            --volname "Xvoice" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Xvoice.app" 180 170 \
            --hide-extension "Xvoice.app" \
            --app-drop-link 480 170 \
            "dist/Xvoice.dmg" \
            "dist/Xvoice.app" \
          || true
          if [ ! -f "dist/Xvoice.dmg" ]; then
            echo "create-dmg failed, falling back to hdiutil"
            hdiutil create -volname "Xvoice" -srcfolder dist/Xvoice.app -ov -format UDZO dist/Xvoice.dmg
          fi

      - name: Verify DMG exists
        run: |
          if [ ! -f "dist/Xvoice.dmg" ]; then
            echo "DMG creation failed"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: xvoice-macos
          path: dist/Xvoice.dmg

  # ── Linux (.AppImage) ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            python3-dev \
            gcc \
            libfuse2 \
            fuse \
            xvfb \
            gir1.2-gtk-3.0 \
            gir1.2-appindicator3-0.1 \
            libayatana-appindicator3-dev
          sudo apt-get install -y libgirepository1.0-dev || \
          sudo apt-get install -y libgirepository-1.0-dev

      - name: Install Python dependencies
        run: pip install pyaudio pynput webrtcvad-wheels python-dotenv requests pystray Pillow pyinstaller

      - name: Fix webrtcvad metadata
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          DIR="$SITE/webrtcvad-2.0.14.dist-info"
          mkdir -p "$DIR"
          printf 'Metadata-Version: 2.1\nName: webrtcvad\nVersion: 2.0.14\n' > "$DIR/METADATA"
          echo "Created: $DIR/METADATA"
          cat "$DIR/METADATA"

      - name: Build xvoice binary
        run: xvfb-run pyinstaller --noconfirm xvoice.spec

      - name: Verify binary exists
        run: |
          if [ ! -f "dist/xvoice" ]; then
            echo "Build failed: xvoice binary not found"
            exit 1
          fi

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/xvoice AppDir/usr/bin/xvoice
          chmod +x AppDir/usr/bin/xvoice

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export PATH="${HERE}/usr/bin/:${PATH}"
          exec "${HERE}/usr/bin/xvoice" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/xvoice.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Xvoice
          Exec=xvoice
          Icon=xvoice
          Comment=Press F8 anywhere to instantly convert your voice to text
          Categories=Utility;
          NoDisplay=false
          EOF

          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA', (256, 256), (0,0,0,0))
          d = ImageDraw.Draw(img)
          d.ellipse([0,0,255,255], fill=(124,58,237,255))
          d.rounded_rectangle([82,30,174,150], radius=38, fill='white')
          d.arc([54,96,202,208], start=0, end=180, fill='white', width=14)
          d.line([128,208,128,240], fill='white', width=14)
          d.line([96,240,160,240], fill='white', width=14)
          img.save('AppDir/xvoice.png')
          "

      - name: Package as AppImage
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir dist/Xvoice-x86_64.AppImage

      - name: Verify AppImage exists
        run: |
          if [ ! -f "dist/Xvoice-x86_64.AppImage" ]; then
            echo "AppImage creation failed"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: xvoice-linux
          path: dist/Xvoice-x86_64.AppImage

  # ── GitHub Release (waits for all 3 builds) ───────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Xvoice ${{ github.ref_name }}"
          files: |
            artifacts/xvoice-windows/xvoice.exe
            artifacts/xvoice-macos/Xvoice.dmg
            artifacts/xvoice-linux/Xvoice-x86_64.AppImage
          body: |
            ## Xvoice ${{ github.ref_name }}

            | Platform | Download | Instructions |
            |----------|----------|--------------|
            | 🪟 Windows | `xvoice.exe` | Double-click to run |
            | 🍎 macOS  | `Xvoice.dmg` | Open DMG → drag Xvoice to Applications |
            | 🐧 Linux  | `Xvoice-x86_64.AppImage` | `chmod +x Xvoice-x86_64.AppImage && ./Xvoice-x86_64.AppImage` |

            ### First run
            Your browser will open automatically to link your Xvoice account.
            Press **F8** anywhere on your computer to start dictating.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}